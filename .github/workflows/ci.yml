name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: cashflow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:test@localhost:5432/cashflow_test
      TELEGRAM_BOT_TOKEN: test_token
      TELEGRAM_BOT_SECRET: test_secret
      NEXTAUTH_SECRET: test_nextauth_secret
      YUKASSA_SHOP_ID: test_shop
      YUKASSA_SECRET_KEY: test_key
      NEXT_PUBLIC_TG_APP_URL: https://test.example.com
      ADMIN_TELEGRAM_IDS: ""
      OWNER_TELEGRAM_IDS: ""
      HOST_TELEGRAM_IDS: ""

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://postgres:test@localhost:5432/cashflow_test

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build:ci
